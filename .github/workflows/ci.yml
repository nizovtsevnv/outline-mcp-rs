name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            # CI optimizations
            max-jobs = auto
            cores = 0
            system-features = nixos-test benchmark big-parallel kvm

      - name: Setup Nix cache
        uses: cachix/cachix-action@v15
        with:
          name: nix-community
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      # Cache Rust/Cargo dependencies
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-target-

      # Быстрые проверки (без компиляции)

      - name: Check code formatting
        run: nix develop -c cargo fmt --all --check

      - name: Run clippy (with caching)
        run: nix develop -c cargo clippy --all-targets --all-features -- -D warnings

      # Тесты (используют закешированные артефакты)
      - name: Run tests
        run: nix develop -c cargo test --verbose

      # Security checks (быстрые)
      - name: Security audit
        run: nix develop -c cargo audit
        continue-on-error: true  # cargo-audit may fail on newer CVSS formats

      - name: License check
        run: nix develop -c cargo deny check
        continue-on-error: true  # cargo-deny may fail on newer CVSS formats

  # Минимальная проверка сборки (только если основные проверки прошли)
  build-smoke-test:
    name: Build Smoke Test
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Nix cache
        uses: cachix/cachix-action@v15
        with:
          name: nix-community
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      # Проверка актуальности cargoHash и сборка
      - name: Verify cargoHash and build
        run: |
          echo "🔍 Verifying cargoHash is up to date..."
          if ! nix build 2>/dev/null; then
            echo "❌ cargoHash in flake.nix is outdated!"
            echo ""
            echo "To fix this:"
            echo "1. Run locally: ./scripts/update-cargo-hash.sh"
            echo "2. Commit the updated flake.nix"
            echo "3. Push the changes"
            echo ""
            echo "This ensures reproducible builds between local and CI environments."
            exit 1
          fi
          
          echo "✅ cargoHash is up to date"
          echo "✅ Native build successful"
          
          # Быстрая проверка что бинарь работает
          if [[ -x result/bin/outline-mcp ]]; then
            echo "✅ Binary is executable"
            result/bin/outline-mcp --help || echo "ℹ️  Help command may require env vars"
          fi
          echo "✅ Native build successful"
          
          # Быстрая проверка что бинарь работает
          if [[ -x result/bin/outline-mcp ]]; then
            echo "✅ Binary is executable"
            result/bin/outline-mcp --help || echo "ℹ️  Help command may require env vars"
          fi